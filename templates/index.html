<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zenith | SVM Underwriter</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-page: #f3f4f6; --bg-surface: #ffffff;
            --text-primary: #111827; --text-secondary: #6b7280;
            --accent-blue: #2563eb; --accent-indigo: #4f46e5;
            --success: #10b981; --danger: #ef4444;
            --border-color: #e5e7eb; --radius-lg: 16px; --radius-md: 8px;
            --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Space Grotesk', sans-serif; }
        body { background-color: var(--bg-page); color: var(--text-primary); }

        .navbar {
            padding: 15px 35px; background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(16px);
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 20px; z-index: 100; margin: 20px auto 40px auto; 
            width: 95%; max-width: 1400px; border-radius: 50px; box-shadow: var(--shadow);
        }
        .nav-brand { font-size: 1.4rem; font-weight: 700; background: linear-gradient(90deg, var(--accent-blue), var(--accent-indigo)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .nav-status { background: #ecfdf5; color: var(--success); padding: 8px 16px; border-radius: 20px; font-size: 0.8rem; font-weight: 700; }

        .container { max-width: 1400px; margin: 0 auto; padding: 0 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 40px; }
        .surface-card { background: var(--bg-surface); border-radius: var(--radius-lg); padding: 35px; box-shadow: var(--shadow); }
        
        .section-header { font-size: 1.1rem; font-weight: 700; text-transform: uppercase; margin-bottom: 25px; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .input-group { display: flex; flex-direction: column; gap: 8px; }
        label { font-size: 0.75rem; font-weight: 700; color: var(--text-secondary); text-transform: uppercase; }
        input { width: 100%; padding: 16px; border-radius: var(--radius-md); border: 1px solid var(--border-color); background: #f9fafb; font-size: 1rem; font-weight: 500; }
        input:focus { outline: none; border-color: var(--accent-blue); background: #fff; box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15); }
        
        .btn-submit { grid-column: span 2; padding: 18px; border-radius: var(--radius-md); border: none; background: linear-gradient(135deg, var(--accent-blue), var(--accent-indigo)); color: white; font-size: 1.1rem; font-weight: 700; cursor: pointer; transition: transform 0.2s; margin-top: 10px; }
        .btn-submit:hover { transform: translateY(-2px); }

        .analytics-col { display: flex; flex-direction: column; gap: 30px; }
        .decision-banner { padding: 25px 30px; border-radius: var(--radius-lg); border: 1px solid var(--border-color); background: #f9fafb; border-left: 6px solid var(--text-secondary); display: flex; justify-content: space-between; align-items: center; }
        .decision-title { font-size: 2rem; font-weight: 700; margin-bottom: 4px; }
        .decision-conf { font-size: 1rem; color: var(--text-secondary); }
        .theme-approved { border-left-color: var(--success); background: #f0fdf4; }
        .theme-approved .decision-title { color: var(--success); }
        .theme-rejected { border-left-color: var(--danger); background: #fef2f2; }
        .theme-rejected .decision-title { color: var(--danger); }

        .chart-box { background: var(--bg-surface); border-radius: var(--radius-lg); padding: 20px; box-shadow: var(--shadow); height: 350px; display: flex; flex-direction: column; }
        .chart-box h3 { font-size: 0.8rem; font-weight: 700; color: var(--text-secondary); text-transform: uppercase; text-align: center; margin-bottom: 20px; }
        .canvas-wrapper { position: relative; flex-grow: 1; }
        canvas { position: absolute; top: 0; left: 0; width: 100% !important; height: 100% !important; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-brand">Zenith | FinTech Underwriter</div>
        <div class="nav-status">BANK</div>
    </nav>

    <main class="container">
        
        <div class="surface-card">
            <h2 class="section-header">Financial Ratios Engine</h2>
            <form id="loanForm" class="form-grid">
                
                <div class="input-group"><label>CIBIL Score (300-900)</label><input type="number" id="cibil" value="750" max="900" min="300" required></div>
                <div class="input-group"><label>Loan Term (Years)</label><input type="number" id="term" value="5" required></div>
                
                <div class="input-group" style="grid-column: span 2;"><label>Annual Income (₹)</label><input type="number" id="income" value="1200000" required></div>
                <div class="input-group" style="grid-column: span 2;"><label>Total Declared Assets (₹)</label><input type="number" id="total_assets" value="4000000" required></div>
                <div class="input-group" style="grid-column: span 2;"><label>Requested Loan Amount (₹)</label><input type="number" id="loan_amount" value="500000" required></div>
                
                <button type="submit" class="btn-submit">Process AI Decision</button>
            </form>
        </div>

        <div class="analytics-col">
            <div class="decision-banner" id="decPanel">
                <div>
                    <h2 class="decision-title" id="resTitle">SYSTEM IDLE</h2>
                    <p class="decision-conf" id="resConf">Awaiting submission.</p>
                </div>
                <p id="resMsg" style="color: var(--text-secondary); max-width: 250px; text-align: right; font-size: 0.9rem;"></p>
            </div>

            <div class="chart-box">
                <h3>Geometric Boundary Vectors (Ratios)</h3>
                <div class="canvas-wrapper"><canvas id="ratioChart"></canvas></div>
            </div>
        </div>

    </main>

    <script>
        Chart.defaults.font.family = "'Space Grotesk', sans-serif";
        
        const ctxRatio = document.getElementById('ratioChart').getContext('2d');
        let ratioChart = new Chart(ctxRatio, {
            type: 'bar',
            data: { labels: ['Income Coverage', 'Asset Coverage'], datasets: [{ label: 'Ratio (Multiplier)', data: [2.4, 8.0], backgroundColor: ['#10b981', '#4f46e5'], borderRadius: 8 }] },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true } } }
        });

        document.getElementById('loanForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const panel = document.getElementById('decPanel');
            document.getElementById('resTitle').innerText = 'ANALYZING...';
            document.getElementById('resTitle').style.color = 'var(--accent-blue)';
            panel.className = 'decision-banner';

            const data = {
                cibil: document.getElementById('cibil').value,
                term: document.getElementById('term').value,
                income: document.getElementById('income').value,
                total_assets: document.getElementById('total_assets').value,
                loan_amount: document.getElementById('loan_amount').value
            };

            const incomeCoverage = data.income / data.loan_amount;
            const assetCoverage = data.total_assets / data.loan_amount;
            ratioChart.data.datasets[0].data = [incomeCoverage, assetCoverage];
            ratioChart.update();

            try {
                const response = await fetch('/predict', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data) });
                const result = await response.json();
                
                if(result.status === 'APPROVED') {
                    panel.classList.add('theme-approved');
                } else if(result.status === 'REJECTED') {
                    panel.classList.add('theme-rejected');
                } else {
                    throw new Error(result.message);
                }

                document.getElementById('resTitle').innerText = result.status;
                document.getElementById('resConf').innerHTML = `Confidence: <strong>${result.confidence}%</strong>`;
                document.getElementById('resMsg').innerText = result.message;
                
            } catch (err) {
                document.getElementById('resTitle').innerText = 'ERROR';
                document.getElementById('resMsg').innerText = err.message;
            }
        });
    </script>
</body>
</html>
